                "当时会有点不舒服，但过一会儿就忘了",
                "会记着，下次帮之前会多想想",
                "会反复想：'我帮他那么多，他怎么能这样？'",
                "会找机会提醒他：'上次那事你还欠我一顿饭呢'"
            ],
            scores: [-1, 0, 1, 2, 2]
        },
        {
            type: "mc",
            scene: "【生活场景】朋友约你周末出来玩，但你其实有点累不太想动。",
            q: "你通常会怎么拒绝？",
            opts: [
                "直接说：'最近有点累，这周想休息一下，下次我约你'",
                "找借口：'不好意思，周末要加班...'",
                "直接拒绝：'不想去，在家待着'",
                "犹豫半天，最后还是去了但全程有点不在状态",
                "编个理由：'身体有点不舒服...'然后心里还是有点愧疚"
            ],
            scores: [-1, 1, 2, 0, 1]
        },
        {
            type: "scale",
            scene: "【通用场景】在表达不同意见时，你更倾向于用'可是我觉得...'而不是直接说'你错了'。",
            q: "你觉得这说的是你吗？",
            opts: [
                "完全符合，我很注意措辞，不想伤害对方感受",
                "比较符合，但对很熟的人可能会直接一点",
                "看情况，看对方是谁",
                "不太符合，我觉得对错分明，没必要拐弯抹角",
                "完全不符合，我说话一向直接"
            ],
            scores: [-1, 0, 0, 1, 2]
        }
    ];
    
    const dimMap = {
        1: 'criticism', 2: 'criticism', 3: 'indifference', 4: 'taking',
        5: 'defensive', 6: 'defensive', 7: 'indifference', 8: 'indifference',
        9: 'indifference', 10: 'forgetful', 11: 'indifference', 12: 'forgetful',
        13: 'defensive', 14: 'narcissism', 15: 'defensive', 16: 'defensive',
        17: 'taking', 18: 'narcissism', 19: 'criticism', 20: 'taking',
        21: 'narcissism', 22: 'criticism', 23: 'taking', 24: 'defensive', 25: 'defensive'
    };
    
    const letters = ['A', 'B', 'C', 'D', 'E'];
    let currentQ = 0;
    let answers = {};
    const code = new URLSearchParams(window.location.search).get('code') || 'test';
    
    function renderQuestion() {
        const q = questions[currentQ];
        const isScale = q.type === 'scale';
        
        document.getElementById('question-num').textContent = `问题 ${currentQ + 1}`;
        document.getElementById('question-text').textContent = q.q;
        document.getElementById('scene-text').textContent = q.scene;
        document.getElementById('progress-text').textContent = `第 ${currentQ + 1}/25 题`;
        document.getElementById('progress-percent').textContent = `${Math.round((currentQ + 1) / 25 * 100)}%`;
        document.getElementById('progress-fill').style.width = `${(currentQ + 1) / 25 * 100}%`;
        document.getElementById('scale-labels').style.display = isScale ? 'flex' : 'none';
        document.getElementById('question-box').className = 'question-box ' + (isScale ? 'scale-question' : 'mc-question');
        
        const optsHtml = q.opts.map((opt, i) => `
            <div class="option ${answers[currentQ] === i ? 'selected' : ''}" onclick="selectOption(${i})">
                <span class="option-letter">${letters[i]}</span>
                <span class="option-text">${opt}</span>
            </div>
        `).join('');
        document.getElementById('options').innerHTML = optsHtml;
        
        document.getElementById('btn-prev').disabled = currentQ === 0;
        document.getElementById('btn-next').disabled = answers[currentQ] === undefined;
        document.getElementById('btn-next').textContent = currentQ === 24 ? '查看结果 →' : '下一题 →';
        document.title = `人性弱点测试 | 第 ${currentQ + 1}/25 题`;
    }
    
    function selectOption(idx) {
        answers[currentQ] = idx;
        renderQuestion();
    }
    
    function nextQuestion() {
        if (currentQ < 24) {
            currentQ++;
            renderQuestion();
        } else {
            submitTest();
        }
    }
    
    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            renderQuestion();
        }
    }
    
    function submitTest() {
        const params = new URLSearchParams();
        params.set('code', code);
        for (let i = 0; i < 25; i++) {
            if (answers[i] !== undefined) {
                params.set('q' + (i + 1), answers[i]);
            }
        }
        window.location.href = '/result?' + params.toString();
    }
    
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            if (answers[currentQ] !== undefined) nextQuestion();
        } else if (e.key === 'ArrowLeft') {
            prevQuestion();
        } else if (e.key >= '1' && e.key <= '5') {
            selectOption(parseInt(e.key) - 1);
        }
    });
    
    renderQuestion();
    </script>
</body>
</html>
